<!DOCTYPE html>
<html lang="ro">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Route Planner Curieri</title>
  <link rel="stylesheet" href="style.css" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
</head>
<body>
  <div class="app-shell">
    <aside class="sidebar">
      <header class="brand">
        <h1>Route Planner</h1>
        <p>Curieri · adrese · intervale de livrare</p>
      </header>

      <section class="panel">
        <h2>Import</h2>
        <input type="file" id="fileInput" accept=".csv,.xlsx,.xls,.numbers" />
        <div class="hint">Încarcă exportul WooCommerce sau un fișier de test.</div>
      </section>

      <section class="panel">
        <h2>Curieri</h2>
        <div id="couriersList"></div>
        <button id="addCourierBtn">+ Adaugă curier</button>
      </section>

      <section class="panel">
        <h2>Adrese</h2>
        <div id="addressesList"></div>
      </section>

      <section class="panel">
        <h2>Trasee</h2>
        <div id="routesList"></div>
      </section>

      <section class="panel actions">
        <button id="autoAssignBtn">Repartizează automat</button>
        <button id="exportBtn">Export Excel</button>
      </section>
    </aside>

    <main class="main">
      <div id="map"></div>
    </main>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="app.js"></script>
</body>
</html>
